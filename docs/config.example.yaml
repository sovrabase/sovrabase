server:
  host: "0.0.0.0"
  port: 8080

metadata_store:
  driver: "sqlite" # sqlite|postgres
  sqlite:
    path: "/data/sovrabase.db"
  postgres:
    dsn: "postgres://user:password@localhost:5432/sovrabase?sslmode=disable"

core:
  master_key_env: "SOVRABASE_MASTER_KEY"
  cache_ttl: "15m"
  sweep_interval: "1m"

auth:
  jwt_secret_env: "SOVRABASE_JWT_SECRET"

provisioning:
  default_provider: "docker"
  docker:
    enabled: true
    endpoint: "unix:///var/run/docker.sock"
    mode: "host_port" # host_port|network
    host_address: "127.0.0.1"
    network_name: "sovrabase-managed"
    postgres_image: "postgres:16-alpine"
    mongo_image: "mongo:7"
