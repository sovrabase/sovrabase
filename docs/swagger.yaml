basePath: /
definitions:
  analytics.Event:
    properties:
      name:
        type: string
      properties:
        additionalProperties: true
        type: object
      timestamp:
        type: string
      user_id:
        type: string
    type: object
  api.FileInfo:
    properties:
      bucket:
        type: string
      content_type:
        type: string
      created_at:
        type: string
      path:
        type: string
      size:
        type: integer
      updated_at:
        type: string
      url:
        type: string
    type: object
  api.ProviderMetaInfo:
    properties:
      provider:
        type: string
      provider_id:
        type: string
    type: object
  api.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  api.UserInfo:
    properties:
      _metadata:
        items:
          $ref: '#/definitions/api.ProviderMetaInfo'
        type: array
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_verified:
        type: boolean
      name:
        type: string
      role:
        type: string
      verification_token:
        type: string
    type: object
  api.batchOperation:
    properties:
      data:
        additionalProperties: true
        description: document data
        type: object
      id:
        description: document ID (optional for insert)
        type: string
      op:
        description: '"insert", "update", "delete"'
        type: string
    type: object
  api.batchRequest:
    properties:
      operations:
        items:
          $ref: '#/definitions/api.batchOperation'
        type: array
    type: object
  api.configSetRequest:
    properties:
      description:
        type: string
      key:
        type: string
      public:
        type: boolean
      type:
        type: string
      value: {}
    type: object
  api.forgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  api.magicLinkRequest:
    properties:
      email:
        type: string
    type: object
  api.mfaChallengeRequest:
    properties:
      challenge_token:
        type: string
      code:
        type: string
    type: object
  api.queryRequest:
    properties:
      filter:
        additionalProperties: true
        type: object
      limit:
        type: integer
      offset:
        type: integer
      order_by:
        type: string
      order_dir:
        description: '"asc" or "desc", default "asc"'
        type: string
      projection:
        items:
          type: string
        type: array
      select:
        items:
          type: string
        type: array
    type: object
  api.refreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  api.resetPasswordRequest:
    properties:
      password:
        type: string
      token:
        type: string
    type: object
  api.searchRequest:
    properties:
      fields:
        items:
          type: string
        type: array
      limit:
        type: integer
      query:
        type: string
    type: object
  api.signInRequest:
    properties:
      captcha_token:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  api.signUpRequest:
    properties:
      captcha_token:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  api.signedURLRequest:
    properties:
      expires_in:
        description: seconds; default 3600
        type: integer
      path:
        type: string
    type: object
  api.signedURLResponse:
    properties:
      expires_at:
        description: ISO 8601
        type: string
      signed_url:
        type: string
    type: object
  api.updateMeRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
    type: object
  api.verifyEmailRequest:
    properties:
      token:
        type: string
    type: object
  api.verifyMagicLinkRequest:
    properties:
      email:
        type: string
      token:
        type: string
    type: object
  configmaps.Entry:
    properties:
      created_at:
        type: string
      description:
        type: string
      key:
        type: string
      public:
        type: boolean
      type:
        $ref: '#/definitions/configmaps.ValueType'
      updated_at:
        type: string
      value: {}
    type: object
  configmaps.ValueType:
    enum:
    - string
    - number
    - boolean
    - json
    type: string
    x-enum-varnames:
    - ValueString
    - ValueNumber
    - ValueBoolean
    - ValueJSON
host: localhost:6070
info:
  contact:
    email: hello@sovrabase.eu
    name: Sovrabase
    url: https://sovrabase.eu
  description: Sovereign European BaaS — lightweight open-source Supabase alternative.
    Provides JSON document database (PebbleDB), JWT/OAuth authentication, file storage
    (local + S3), realtime WebSocket, queues, and config maps — all in a single ~40
    MB binary.
  license:
    name: AGPL-3.0
    url: https://github.com/sovrabase/sovrabase/blob/main/LICENSE
  title: Sovrabase API
  version: "1.0"
paths:
  /api/v1/collections/{collection}:
    get:
      consumes:
      - application/json
      description: List documents in a collection with optional filtering, field selection,
        and pagination. Query parameters are treated as filter fields.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Comma-separated list of fields to return
        in: query
        name: select
        type: string
      - description: Maximum number of documents to return (paginated response)
        in: query
        name: limit
        type: integer
      - description: Number of documents to skip (paginated response)
        in: query
        name: offset
        type: integer
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of documents or paginated response
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List documents
      tags:
      - database
    post:
      consumes:
      - application/json
      description: Insert a new document into the specified collection. An _id is
        auto-generated if not provided.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Document to insert
        in: body
        name: document
        required: true
        schema:
          additionalProperties: true
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created document
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid document
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: RLS policy restricts insertion
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Insert a document
      tags:
      - database
  /api/v1/collections/{collection}/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a document by ID from the specified collection.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Document deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: RLS policy restricts deletion
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Document not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a document
      tags:
      - database
    get:
      consumes:
      - application/json
      description: Retrieve a single document by its ID from the specified collection.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Retrieved document
          schema:
            additionalProperties: true
            type: object
        "403":
          description: RLS policy restricts access
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Document not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a document by ID
      tags:
      - database
    put:
      consumes:
      - application/json
      description: Partially update an existing document by ID. Supports both PUT
        and PATCH methods.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Partial document update
        in: body
        name: document
        required: true
        schema:
          additionalProperties: true
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Updated document
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid document
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: RLS policy restricts update
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Document not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a document
      tags:
      - database
  /api/v1/collections/{collection}/batch:
    post:
      consumes:
      - application/json
      description: Execute multiple insert, update, and delete operations in a single
        atomic batch.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Batch operations
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.batchRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Batch results
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Batch operations
      tags:
      - database
  /api/v1/collections/{collection}/query:
    post:
      consumes:
      - application/json
      description: Query documents in a collection with a structured filter, field
        projection, and pagination.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Query parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.queryRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Query results or paginated response
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid query
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query documents
      tags:
      - database
  /api/v1/collections/{collection}/search:
    post:
      consumes:
      - application/json
      description: Perform a full-text search on documents in a collection.
      parameters:
      - description: Collection name
        in: path
        name: collection
        required: true
        type: string
      - description: Search parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.searchRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Search results
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request or query required
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Full-text search
      tags:
      - database
  /api/v1/config:
    get:
      description: Returns all config entries for the project.
      parameters:
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List config entries
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Creates a new config entry (POST) or updates an existing one (PUT).
        On successful create returns 201, on update returns 200.
      parameters:
      - description: Config entry
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.configSetRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/configmaps.Entry'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/configmaps.Entry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create or update config entry
      tags:
      - config
  /api/v1/config/{key}:
    delete:
      description: Deletes a config entry by its key.
      parameters:
      - description: Config key
        in: path
        name: key
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete config entry
      tags:
      - config
    get:
      description: Returns a single config entry by its key.
      parameters:
      - description: Config key
        in: path
        name: key
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/configmaps.Entry'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get config entry
      tags:
      - config
    put:
      consumes:
      - application/json
      description: Creates a new config entry (POST) or updates an existing one (PUT).
        On successful create returns 201, on update returns 200.
      parameters:
      - description: Config key (for PUT)
        in: path
        name: key
        type: string
      - description: Config entry
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.configSetRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/configmaps.Entry'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/configmaps.Entry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create or update config entry
      tags:
      - config
  /api/v1/config/public:
    get:
      description: Returns all public config entries as a simple key→value map. No
        authentication required.
      parameters:
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List public config
      tags:
      - config
  /api/v1/events:
    post:
      consumes:
      - application/json
      description: Accepts a batch of analytics events for processing. Returns 202
        with count of accepted events.
      parameters:
      - description: Analytics events
        in: body
        name: body
        required: true
        schema:
          properties:
            events:
              items:
                $ref: '#/definitions/analytics.Event'
              type: array
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ingest analytics events
      tags:
      - analytics
  /api/v1/me:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently authenticated user.
      parameters:
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User profile
          schema:
            $ref: '#/definitions/api.UserInfo'
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
    patch:
      consumes:
      - application/json
      description: Update the authenticated user's profile. Only name and avatar_url
        can be changed. All fields are optional — only the fields present in the request
        body are updated.
      parameters:
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.updateMeRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Updated user profile
          schema:
            $ref: '#/definitions/api.UserInfo'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - auth
  /api/v1/queues/delete:
    post:
      consumes:
      - application/json
      description: Deletes a message by its ID from the specified queue (acknowledges
        receipt).
      parameters:
      - description: Delete request
        in: body
        name: body
        required: true
        schema:
          properties:
            id:
              type: string
            queue:
              type: string
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete message from queue
      tags:
      - queues
  /api/v1/queues/receive:
    post:
      consumes:
      - application/json
      description: Receives up to `limit` messages from the specified queue. Messages
        are made invisible until deleted or timeout.
      parameters:
      - description: Receive request
        in: body
        name: body
        required: true
        schema:
          properties:
            limit:
              type: integer
            queue:
              type: string
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Receive messages from queue
      tags:
      - queues
  /api/v1/queues/send:
    post:
      consumes:
      - application/json
      description: Sends a JSON message to the specified queue. Returns the message
        ID and queue name.
      parameters:
      - description: Queue message
        in: body
        name: body
        required: true
        schema:
          properties:
            body:
              additionalProperties: true
              type: object
            queue:
              type: string
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send message to queue
      tags:
      - queues
  /api/v1/storage/{bucket}/{path}:
    delete:
      consumes:
      - application/json
      description: Delete a file from the specified storage bucket.
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: File path
        in: path
        name: path
        required: true
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: File deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: File not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a file
      tags:
      - storage
    get:
      consumes:
      - application/json
      description: Download a file from the specified storage bucket. Supports optional
        image transformation parameters.
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: File path
        in: path
        name: path
        required: true
        type: string
      - description: Image width for transformation
        in: query
        name: w
        type: integer
      - description: Image height for transformation
        in: query
        name: h
        type: integer
      - description: Image output format (e.g., webp, jpeg)
        in: query
        name: format
        type: string
      - description: Image fit mode (e.g., cover, contain)
        in: query
        name: fit
        type: string
      - description: Image quality (1-100)
        in: query
        name: quality
        type: integer
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content
          schema:
            type: file
        "404":
          description: File not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download a file
      tags:
      - storage
  /api/v1/storage/{bucket}/list:
    get:
      consumes:
      - application/json
      description: List files in a storage bucket, optionally filtered by prefix.
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Path prefix to filter by
        in: query
        name: prefix
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of files
          schema:
            items:
              $ref: '#/definitions/api.FileInfo'
            type: array
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List files in bucket
      tags:
      - storage
  /api/v1/storage/{bucket}/signed-url:
    post:
      consumes:
      - application/json
      description: Generate a time-limited, cryptographically signed URL that grants
        temporary access to a file without requiring a project key. The signed URL
        can be embedded directly in <img> tags, shared links, etc. Default expiry
        is 1 hour.
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Signed URL request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.signedURLRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Signed URL
          schema:
            $ref: '#/definitions/api.signedURLResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate a signed URL for a file
      tags:
      - storage
  /api/v1/storage/{bucket}/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file to the specified storage bucket. Supports multipart
        form data with optional path.
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Custom file path (defaults to filename)
        in: formData
        name: path
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Uploaded file info
          schema:
            $ref: '#/definitions/api.FileInfo'
        "400":
          description: Invalid form data
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Storage quota exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Upload failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload a file
      tags:
      - storage
  /auth/v1/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password reset email to the specified address. Returns a
        reset token.
      parameters:
      - description: Forgot password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.forgotPasswordRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Password reset email sent
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
