      tags:
      - auth
      - mfa
  /auth/v1/mfa/setup:
    post:
      consumes:
      - application/json
      description: Generate an MFA secret and URI for TOTP setup. Requires authentication.
      parameters:
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
