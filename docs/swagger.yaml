      tags:
      - auth
      - mfa
  /auth/v1/oauth/{provider}:
    get:
      consumes:
      - application/json
      description: Get the OAuth authorization URL for the specified provider. Optionally
        redirects the browser if redirect=true.
      parameters:
      - description: OAuth provider name
        in: path
        name: provider
        required: true
        type: string
      - description: URL to redirect after authentication
        in: query
        name: final_redirect
        type: string
      - description: Set to 'true' for HTTP redirect instead of JSON response
        in: query
        name: redirect
        type: string
      - description: Project key for frontend embedding
        in: query
        name: project_key
        type: string
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OAuth redirect info
          schema:
            additionalProperties:
              type: string
            type: object
        "302":
          description: Browser redirect to OAuth provider
        "400":
          description: Invalid provider
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Initiate OAuth redirect
      tags:
      - auth
  /auth/v1/oauth/{provider}/callback:
    get:
      consumes:
      - application/json
      description: Called by the OAuth provider after user authentication. Reads code
        and state from query params, exchanges for tokens, and redirects the browser
        with tokens in the URL fragment.
      parameters:
      - description: OAuth provider name
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code from OAuth provider
        in: query
        name: code
        required: true
        type: string
      - description: State token from OAuth redirect
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect with tokens in fragment
        "400":
          description: Missing code or state
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Authentication failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OAuth callback handler
      tags:
      - auth
  /auth/v1/refresh:
