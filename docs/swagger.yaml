      produces:
      - application/json
      responses:
        "200":
          description: MFA status
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Authentication required
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
