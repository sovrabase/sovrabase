      - auth
  /auth/v1/mfa/challenge:
    post:
      consumes:
      - application/json
      description: Complete an MFA challenge by providing the TOTP code. Returns authentication
        tokens.
      parameters:
      - description: MFA challenge completion
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.mfaChallengeRequest'
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
