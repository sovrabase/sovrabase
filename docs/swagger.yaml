        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid challenge
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Complete MFA challenge
      tags:
      - auth
  /auth/v1/mfa/confirm:
    post:
      consumes:
      - application/json
      description: Confirm MFA setup by providing a valid TOTP code. Returns backup
        codes. Requires authentication.
      parameters:
      - description: MFA confirmation with code
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: MFA enabled with backup codes
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid code
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Authentication required
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Confirm MFA setup
      tags:
      - auth
      - mfa
  /auth/v1/mfa/disable:
    post:
      consumes:
      - application/json
      description: Disable MFA for the authenticated user. Requires a valid TOTP code.
        Requires authentication.
      parameters:
      - description: MFA disable with code
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: MFA disabled
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid code
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Authentication required
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
