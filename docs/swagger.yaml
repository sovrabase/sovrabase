        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Captcha verification failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign in an existing user
      tags:
      - auth
  /auth/v1/signup:
    post:
