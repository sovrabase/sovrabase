      produces:
      - application/json
      responses:
        "200":
          description: MFA setup data
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Setup failed
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Authentication required
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Setup MFA
      tags:
      - auth
      - mfa
  /auth/v1/mfa/status:
    get:
      consumes:
      - application/json
      description: Check whether MFA is enabled for the authenticated user.
      parameters:
      - description: Project API key for multi-tenant isolation
        in: header
        name: X-Project-Key
        required: true
