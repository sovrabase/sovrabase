name: Docker Build (Multi-Arch)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build \
            -t "$IMAGE:${{ github.ref_name }}-${{ matrix.arch }}" \
            .
          docker push "$IMAGE:${{ github.ref_name }}-${{ matrix.arch }}"

      - name: Build only (PR check)
        if: github.event_name == 'pull_request'
        run: docker build .

  manifest:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          REF="${{ github.ref_name }}"
          SRC_AMD64="$IMAGE:${REF}-amd64"
          SRC_ARM64="$IMAGE:${REF}-arm64"

          # --- Semver tag (e.g. v1.2.3) ---
          if [[ "$REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"

            docker buildx imagetools create \
              -t "$IMAGE:${MAJOR}.${MINOR}.${PATCH}" \
              "$SRC_AMD64" "$SRC_ARM64"

            docker buildx imagetools create \
              -t "$IMAGE:${MAJOR}.${MINOR}" \
              "$SRC_AMD64" "$SRC_ARM64"

            docker buildx imagetools create \
              -t "$IMAGE:${MAJOR}" \
              "$SRC_AMD64" "$SRC_ARM64"

            docker buildx imagetools create \
              -t "$IMAGE:latest" \
              "$SRC_AMD64" "$SRC_ARM64"

          # --- Branch push (e.g. main) ---
          elif [[ "$REF" == "main" ]]; then
            docker buildx imagetools create \
              -t "$IMAGE:main" \
              "$SRC_AMD64" "$SRC_ARM64"

            docker buildx imagetools create \
              -t "$IMAGE:latest" \
              "$SRC_AMD64" "$SRC_ARM64"

          # --- Fallback (unknown ref type, push anyway) ---
          else
            docker buildx imagetools create \
              -t "$IMAGE:${REF}" \
              "$SRC_AMD64" "$SRC_ARM64"
          fi

          # SHA manifest (always, for immutable pinning)
          docker buildx imagetools create \
            -t "$IMAGE:sha-${{ github.sha }}" \
            "$SRC_AMD64" "$SRC_ARM64"
